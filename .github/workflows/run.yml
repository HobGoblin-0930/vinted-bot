name: Vinted Alert Bot

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python vinted_discord_alert.py
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
